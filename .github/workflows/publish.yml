name: "Tauri Cross-Platform Build & Publish"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'windows-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            squashfs-tools

      - name: Install node dependencies
        run: npm install

      - name: Build Tauri App and Publish to GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'SecureVault v__VERSION__'
          releaseBody: 'SecureVault 桌面端多端安装包。自动构建于 GitHub Actions 云环境。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload portable binary to release
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            BIN="src-tauri/target/release/secure-vault-desktop.exe"
            ZIP="SecureVault_${{ github.ref_name }}_portable_windows.zip"
            7z a "$ZIP" "$BIN"
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            BIN="src-tauri/target/aarch64-apple-darwin/release/secure-vault-desktop"
            ZIP="SecureVault_${{ github.ref_name }}_portable_macos.zip"
            zip -j "$ZIP" "$BIN"
          else
            BIN="src-tauri/target/release/secure-vault-desktop"
            ZIP="SecureVault_${{ github.ref_name }}_portable_linux.zip"
            zip -j "$ZIP" "$BIN"
          fi
          gh release upload "${{ github.ref_name }}" "$ZIP" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
